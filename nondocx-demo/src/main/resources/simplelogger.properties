# slf4j-simple 配置文件。
# 必须放在 classpath 根（src/main/resources/），slf4j-simple 启动时自动读取。
# 详见 org.slf4j.simple.SimpleLogger 字段。

# ---- 输出目标 ----
# System.out = 控制台标准输出（demo 默认）；也可填文件绝对路径。
org.slf4j.simpleLogger.logFile=System.out

# ---- 格式 ----
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS
# 只显示 logger 短名（类名），不显示全限定名 + 线程名，控制台更清爽。
org.slf4j.simpleLogger.showShortLogName=true
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.levelInBrackets=true

# ---- 默认级别 ----
org.slf4j.simpleLogger.defaultLogLevel=info

# ---- 按 logger 名分级（覆盖默认级别）----
# demo 自身代码开到 debug，便于追踪 Agent 调用过程。
org.slf4j.simpleLogger.log.com.non.docx.demo=debug

# 压低 web 层噪音：Javalin / Jetty 的 INFO（路由注册、请求行）demo 不需要。
org.slf4j.simpleLogger.log.io.javalin=warn
org.slf4j.simpleLogger.log.org.eclipse.jetty=warn
